version: "3.9"

services:
  zoom-insights:
    build: .
    image: zoom-insights:latest
    env_file: .env
    volumes:
      - ./output:/output
      - ./recordings:/recordings
      - data:/data
    command: ["--help"]

volumes:
  data:

